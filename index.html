<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babylon.js SPZ Viewer</title>
    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
        #renderCanvas { width: 100%; height: 100%; touch-action: none; }
    </style>
    <script src="./babylon.js"></script>
    <script src="./babylonjs.loaders.min.js"></script>
    <script src="./babylon.splatFileLoader.min.js"></script>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);

        const createScene = async function () {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color3(0.2, 0.2, 0.2);

            // カメラの初期化（数値は後ほどSPZ読み込み成功時に上書きされます）
            const camera = new BABYLON.ArcRotateCamera(
                "camera", 
                0, 
                0, 
                10, 
                BABYLON.Vector3.Zero(), 
                scene
            );
            camera.attachControl(canvas, true);
            camera.wheelPrecision = 50;

            scene.createDefaultLight(true);

            console.log("SPZファイルを読み込み中...");
            try {
                const result = await BABYLON.SceneLoader.ImportMeshAsync("", "./", "untitled.spz", scene);
                console.log("SPZの読み込みが成功しました！");

                // -------------------------------------------------------------
                // 必要に応じてモデルの向きを回転させる（コメントアウトを外して使用）
                // -------------------------------------------------------------
                if (result.meshes && result.meshes.length > 0) {
                    result.meshes.forEach(mesh => {
                        // パターン①：上下逆さまの場合
                        // mesh.rotate(BABYLON.Axis.X, Math.PI, BABYLON.Space.LOCAL);

                        // パターン②：水平方向に反転している場合
                        // mesh.rotate(BABYLON.Axis.Y, Math.PI, BABYLON.Space.LOCAL);
                    });
                }
                // -------------------------------------------------------------

                // =============================================================
                // 【カメラの初期位置をターゲット座標から相対的に設定】
                // =============================================================
                
                const targetPosition = new BABYLON.Vector3(0, -2, 0); //(、ズーム) 
                camera.setTarget(targetPosition);

                camera.radius = 8.0; 
                camera.alpha = Math.PI / -2; 
                camera.beta = Math.PI / 1; 

                // 【追加】カメラの上方向をZ軸（0, 0, 1）に指定する
                camera.upVector = new BABYLON.Vector3(0, 0, -1); //(、上下反転) 

                // =============================================================

            } catch (error) {
                console.error("読み込みエラーが発生しました:", error);
            }

            return scene;
        };

        createScene().then((scene) => {
            engine.runRenderLoop(function () {
                scene.render();
            });
        });

        window.addEventListener("resize", function () {
            engine.resize();
        });
    </script>
</body>
</html>
